name: Backend CI

on:
  push:
    paths:
      - 'team1-back-app/**'
      - 'team1-tf/**'
  pull_request:
    paths:
      - 'team1-back-app/**'
      - 'team1-tf/**'

env:
  ACR_REGISTRY: academyacrj3r5dv.azurecr.io
  IMAGE_NAME: ethan-campbell/team1-back-app

defaults:
  run:
    working-directory: team1-back-app

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: kainos-jobs-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: team1-back-app/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost:5432/kainos-jobs-test

    - name: Run linting
      run: npm run check

    - name: Create .env.test
      run: |
        cat > .env.test << EOF
        PORT=3001
        DB_USER=testuser
        DB_PASSWORD=testpass
        DB_HOST=localhost
        DB_PORT=5432
        DB_NAME=kainos-jobs-test
        DB_SCHEMA=public
        EOF

    - name: Run Prisma migrations
      run: npx dotenv -e .env.test -- prisma migrate deploy

    - name: Run tests
      run: npm run test:coverage

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build --platform linux/amd64 -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      working-directory: team1-back-app

    - name: Login to Azure Container Registry
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ACR_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Tag and push image to ACR
      if: github.ref == 'refs/heads/main'
      working-directory: team1-back-app
      run: |
        docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  terraform:
    name: Terraform Plan / Apply
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: team1-tf
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_ACCESS_KEY: ${{ secrets.TF_BACKEND_ACCESS_KEY }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_project: team1-ethan-campbell
      TF_VAR_location: uksouth
      TF_VAR_environment: dev

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format Check
      run: terraform fmt -check -recursive

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -input=false -out=tfplan

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -input=false -auto-approve tfplan
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: team1-back-app

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: team1-back-app/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Open firewall for runner IP
      id: firewall
      run: |
        RUNNER_IP=$(curl -s https://api.ipify.org)
        echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
        az postgres flexible-server firewall-rule create \
          --resource-group rg-team1-ethan-campbell-dev \
          --name psql-team1-ethan-campbell-dev \
          --rule-name AllowGHActions \
          --start-ip-address "$RUNNER_IP" \
          --end-ip-address "$RUNNER_IP"

    - name: Run Prisma migrations
      run: |
        DB_PASS=$(az keyvault secret show --vault-name kv-team1ec-dev --name DbPassword --query value -o tsv)
        DB_PASS_ENCODED=$(node -e "process.stdout.write(encodeURIComponent('$DB_PASS'))")
        export DB_HOST=psql-team1-ethan-campbell-dev.postgres.database.azure.com
        export DB_PORT=5432
        export DB_USER=team1admin
        export DB_PASSWORD="$DB_PASS_ENCODED"
        export DB_NAME=team1
        export DB_SCHEMA=public
        node_modules/.bin/prisma migrate deploy

    - name: Remove firewall rule
      if: always()
      run: |
        az postgres flexible-server firewall-rule delete \
          --resource-group rg-team1-ethan-campbell-dev \
          --name psql-team1-ethan-campbell-dev \
          --rule-name AllowGHActions \
          --yes || true