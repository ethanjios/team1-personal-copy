name: Backend CI

on:
  push:
    paths:
      - 'team1-back-app/**'
  pull_request:
    paths:
      - 'team1-back-app/**'

defaults:
  run:
    working-directory: team1-back-app

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: kainos-jobs-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: team1-back-app/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost:5432/kainos-jobs-test

    - name: Run linting
      run: npm run check

    - name: Create .env.test
      run: |
        cat > .env.test << EOF
        PORT=3001
        DB_USER=testuser
        DB_PASSWORD=testpass
        DB_HOST=localhost
        DB_PORT=5432
        DB_NAME=kainos-jobs-test
        DB_SCHEMA=public
        EOF

    - name: Run Prisma migrations
      run: npx dotenv -e .env.test -- prisma migrate deploy

    - name: Run tests
      run: npm run test:coverage

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t team1-back-app:${{ github.sha }} .
      working-directory: team1-back-app
