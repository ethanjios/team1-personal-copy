name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_REGISTRY: academyacrj3r5dv.azurecr.io

jobs:
  test-backend:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: kainos-jobs-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: team1-back-app

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: team1-back-app/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost:5432/kainos-jobs-test

    - name: Run linting
      run: npm run check

    - name: Create .env.test
      run: |
        cat > .env.test << EOF
        PORT=3001
        DB_USER=testuser
        DB_PASSWORD=testpass
        DB_HOST=localhost
        DB_PORT=5432
        DB_NAME=kainos-jobs-test
        DB_SCHEMA=public
        EOF

    - name: Run Prisma migrations
      run: npx dotenv -e .env.test -- prisma migrate deploy

    - name: Run tests
      run: npm run test:coverage

  test-frontend:
    name: Frontend – Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: team1-front-app

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: team1-front-app/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Run linting
      run: npm run check

    - name: Run tests
      run: npm run test:coverage

  build:
    name: Build & Push All Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ACR_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # Backend image
    - name: Build backend image
      run: docker build --platform linux/amd64 -t ethan-campbell/team1-back-app:${{ github.sha }} .
      working-directory: team1-back-app

    - name: Push backend image
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag ethan-campbell/team1-back-app:${{ github.sha }} ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-back-app:${{ github.sha }}
        docker tag ethan-campbell/team1-back-app:${{ github.sha }} ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-back-app:latest
        docker push ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-back-app:${{ github.sha }}
        docker push ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-back-app:latest

    # Frontend image
    - name: Build frontend image
      run: docker build --platform linux/amd64 -t ethan-campbell/team1-front-app:${{ github.sha }} .
      working-directory: team1-front-app

    - name: Push frontend image
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag ethan-campbell/team1-front-app:${{ github.sha }} ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-front-app:${{ github.sha }}
        docker tag ethan-campbell/team1-front-app:${{ github.sha }} ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-front-app:latest
        docker push ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-front-app:${{ github.sha }}
        docker push ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-front-app:latest

    # Postgres image
    - name: Build postgres image
      run: docker build --platform linux/amd64 -t ethan-campbell/team1-postgres-app:${{ github.sha }} .
      working-directory: team1-postgres-app

    - name: Push postgres image
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag ethan-campbell/team1-postgres-app:${{ github.sha }} ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-postgres-app:${{ github.sha }}
        docker tag ethan-campbell/team1-postgres-app:${{ github.sha }} ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-postgres-app:latest
        docker push ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-postgres-app:${{ github.sha }}
        docker push ${{ env.ACR_REGISTRY }}/ethan-campbell/team1-postgres-app:latest

  terraform:
    name: Terraform Plan / Apply
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: team1-tf
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_ACCESS_KEY: ${{ secrets.TF_BACKEND_ACCESS_KEY }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_project: team1-ethan-campbell
      TF_VAR_location: uksouth
      TF_VAR_environment: dev
      TF_VAR_backend_image: ethan-campbell/team1-back-app:${{ github.sha }}
      TF_VAR_frontend_image: ethan-campbell/team1-front-app:${{ github.sha }}
      TF_VAR_postgres_image: ethan-campbell/team1-postgres-app:${{ github.sha }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format Check
      run: terraform fmt -check -recursive

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -input=false -out=tfplan

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      run: terraform apply -input=false -auto-approve tfplan
