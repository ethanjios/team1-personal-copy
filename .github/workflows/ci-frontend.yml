name: Frontend CI

on:
  push:
    paths:
      - 'team1-front-app/**'
  pull_request:
    paths:
      - 'team1-front-app/**'

env:
  ACR_REGISTRY: academyacrj3r5dv.azurecr.io
  IMAGE_NAME: ethan-campbell/team1-front-app

defaults:
  run:
    working-directory: team1-front-app

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: team1-front-app/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Run linting
      run: npm run check

    - name: Run tests
      run: npm run test:coverage

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build --platform linux/amd64 -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      working-directory: team1-front-app

    - name: Login to Azure Container Registry
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ACR_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Tag and push image to ACR
      if: github.ref == 'refs/heads/main'
      working-directory: team1-front-app
      run: |
        docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
