name: Frontend CI

on:
  push:
    paths:
      - 'team1-front-app/**'
  pull_request:
    paths:
      - 'team1-front-app/**'

defaults:
  run:
    working-directory: team1-front-app

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: team1-front-app/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Run linting
      run: npm run check

    - name: Run tests
      run: npm run test:coverage

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t team1-front-app:${{ github.sha }} .
      working-directory: team1-front-app
