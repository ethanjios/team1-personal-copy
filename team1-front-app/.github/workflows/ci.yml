# ─────────────────────────────────────────────────────────────
# Frontend CI  –  test → build → deploy
# ─────────────────────────────────────────────────────────────
# Required GitHub Secrets:
#   ACR_USERNAME        – Azure Container Registry username
#   ACR_PASSWORD        – Azure Container Registry password
#   TF_DISPATCH_TOKEN   – GitHub PAT with `repo` scope on the team1-tf repo
#
# Required GitHub Variables (Settings → Variables → Actions):
#   TF_REPO             – owner/repo of the Terraform repo, e.g. ethanjios/team1-tf
# ─────────────────────────────────────────────────────────────

name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_REGISTRY: academyacrj3r5dv.azurecr.io
  IMAGE_PREFIX: ethan-campbell

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - run: npm ci
    - run: npm run build
    - run: npm run check
    - run: npm run test:coverage

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.ACR_REGISTRY }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build & push frontend image
      run: |
        docker build --platform linux/amd64 \
          -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/team1-front-app:${{ github.sha }} \
          -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/team1-front-app:latest \
          .
        docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/team1-front-app --all-tags

  deploy:
    name: Trigger Terraform Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Dispatch to team1-tf repo
      run: |
        curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.TF_DISPATCH_TOKEN }}" \
          "https://api.github.com/repos/${{ vars.TF_REPO }}/dispatches" \
          -d '{
            "event_type": "deploy",
            "client_payload": {
              "frontend_image": "${{ env.IMAGE_PREFIX }}/team1-front-app:${{ github.sha }}"
            }
          }'
